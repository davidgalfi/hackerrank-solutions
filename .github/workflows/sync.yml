name: Sync HackerRank Solutions

on:
  schedule:
    - cron: '0 22 * * *'  # minden nap 22:00 UTC-kor
  workflow_dispatch:       # manuálisan is indítható

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch solutions
        env:
          HRANK_SESSION: ${{ secrets.HRANK_SESSION }}
        run: python fetch_solutions.py

      - name: Commit and push
        run: |
          git config user.name "davidgalfi"
          git config user.email "galfidavid314@gmail.com"
          git add -A
          git diff --staged --quiet || git commit -m "sync: HackerRank solutions $(date +%F)"
          git push https://davidgalfi:${{ secrets.GH_PAT }}@github.com/davidgalfi/hackerrank-solutions.git
