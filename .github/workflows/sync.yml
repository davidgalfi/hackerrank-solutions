name: Sync HackerRank Solutions

on:
  schedule:
    - cron: '0 22 * * *'  # minden nap 22:00 UTC-kor
  workflow_dispatch:       # manuálisan is indítható

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch solutions
        env:
          HRANK_SESSION: ${{ secrets.HRANK_SESSION }}
        run: python fetch_solutions.py

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add solutions/
          git diff --staged --quiet || git commit -m "sync: HackerRank solutions $(date +%F)"
          git push
